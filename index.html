<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Affitti &amp; Utenze</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS client (auth + DB) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Alpine.js per reattivita (deve caricarsi DOPO Supabase) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    // ====== CONFIGURAZIONE SUPABASE ======
    // URL e chiave pubblica del progetto. La chiave anon/public e SICURA da condividere:
    // la Row Level Security protegge i dati a livello database.
    const SUPABASE_URL = 'https://bavkwjxngwzggahdwcjr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhdmt3anhuZ3d6Z2dhaGR3Y2pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjY1MDUsImV4cCI6MjA5MTk0MjUwNX0.cdKrScUz40_9nUGfSpqpfMQeEC3B9mP209ANM2L1VcM';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    html, body { overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    .page-enter { animation: fadeIn 0.15s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .table-dense th, .table-dense td { padding: 0.35rem 0.5rem; font-size: 0.8rem; }

    /* Sfondo video fullscreen */
    .usa-flag-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .usa-flag-bg video {
      position: absolute;
      top: 50%; left: 50%;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0.35;
    }
    @media (prefers-color-scheme: dark) {
      .usa-flag-bg video { opacity: 0.28; }
    }
    .usa-flag-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(249,250,251,0.70) 0%, rgba(249,250,251,0.82) 100%);
      backdrop-filter: blur(1.5px);
    }
    @media (prefers-color-scheme: dark) {
      .usa-flag-bg::after {
        background: linear-gradient(180deg, rgba(17,24,39,0.78) 0%, rgba(17,24,39,0.88) 100%);
      }
    }
    body > *:not(.usa-flag-bg) { position: relative; z-index: 1; }

    /* Pallino animato per stato salvataggio */
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-dot { width: 0.5rem; height: 0.5rem; border-radius: 9999px; display: inline-block; }
    .status-dot.pulsing { animation: pulse-dot 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen antialiased">

<div class="usa-flag-bg" aria-hidden="true">
  <video autoplay loop muted playsinline preload="auto" disablepictureinpicture disableremoteplayback>
    <source src="276973.mp4" type="video/mp4">
  </video>
</div>

<div x-data="app()" x-init="init()" x-cloak class="flex flex-col min-h-screen">

  <!-- ===== SCHERMATA DI LOGIN ===== -->
  <div x-show="!utente && !caricamentoIniziale" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md rounded-2xl shadow-2xl ring-1 ring-gray-200 dark:ring-gray-700 p-6 w-full max-w-md">
      <h1 class="text-xl font-bold text-primary-700 dark:text-primary-400 mb-1">Gestione Affitti</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-5" x-text="modalitaAuth === 'login' ? 'Accedi al tuo account' : 'Crea un nuovo account'"></p>

      <form @submit.prevent="modalitaAuth === 'login' ? eseguiLogin() : eseguiSignup()" class="space-y-3">
        <div>
          <label class="text-xs font-medium">Email</label>
          <input type="email" x-model="authEmail" required autocomplete="email"
                 class="w-full text-sm border rounded px-3 py-2 dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500">
        </div>
        <div>
          <label class="text-xs font-medium">Password</label>
          <input type="password" x-model="authPassword" required minlength="6"
                 :autocomplete="modalitaAuth === 'login' ? 'current-password' : 'new-password'"
                 class="w-full text-sm border rounded px-3 py-2 dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500">
          <p x-show="modalitaAuth === 'signup'" class="text-xs text-gray-400 mt-1">Minimo 6 caratteri</p>
        </div>

        <div x-show="authError" class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded px-3 py-2 text-xs text-red-700 dark:text-red-300" x-text="authError"></div>
        <div x-show="authInfo" class="bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded px-3 py-2 text-xs text-green-700 dark:text-green-300" x-text="authInfo"></div>

        <button type="submit" :disabled="authLoading"
                class="w-full bg-primary-600 hover:bg-primary-700 disabled:opacity-50 text-white rounded-lg py-2 text-sm font-semibold shadow-sm transition active:scale-[0.98]">
          <span x-show="!authLoading" x-text="modalitaAuth === 'login' ? 'Accedi' : 'Registrati'"></span>
          <span x-show="authLoading">Attendere...</span>
        </button>
      </form>

      <div class="mt-4 text-center text-xs">
        <template x-if="modalitaAuth === 'login'">
          <p>Non hai un account?
            <button @click="modalitaAuth = 'signup'; authError = ''; authInfo = ''" class="text-primary-600 dark:text-primary-400 hover:underline font-medium">Registrati</button>
          </p>
        </template>
        <template x-if="modalitaAuth === 'signup'">
          <p>Hai gia un account?
            <button @click="modalitaAuth = 'login'; authError = ''; authInfo = ''" class="text-primary-600 dark:text-primary-400 hover:underline font-medium">Accedi</button>
          </p>
        </template>
      </div>
    </div>
  </div>

  <!-- ===== SCHERMATA DI CARICAMENTO ===== -->
  <div x-show="caricamentoIniziale" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="inline-block w-8 h-8 border-4 border-primary-500 border-t-transparent rounded-full animate-spin mb-3"></div>
      <p class="text-sm text-gray-500">Caricamento in corso...</p>
    </div>
  </div>

  <!-- ===== APP PRINCIPALE (visibile solo se loggato) ===== -->
  <template x-if="utente && !caricamentoIniziale">
  <div class="flex flex-col min-h-screen">

  <!-- ===== HEADER / NAVIGAZIONE ===== -->
  <header class="bg-gradient-to-r from-white via-gray-50 to-white dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm sticky top-0 z-50 backdrop-blur-sm bg-white/90 dark:bg-gray-800/90">
    <!-- Barra principale -->
    <div class="max-w-7xl mx-auto px-3 sm:px-4 flex items-center justify-between h-12 gap-2">
      <!-- Logo + hamburger mobile -->
      <div class="flex items-center gap-2 min-w-0">
        <!-- Hamburger (solo mobile) -->
        <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden p-1.5 -ml-1 rounded hover:bg-gray-100 dark:hover:bg-gray-700" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path x-show="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            <path x-show="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <h1 class="text-base font-bold text-primary-700 dark:text-primary-400 whitespace-nowrap">
          <span class="lg:hidden">Affitti</span>
          <span class="hidden lg:inline">Gestione Affitti</span>
        </h1>
      </div>

      <!-- Nav desktop/tablet (solo md+) -->
      <nav class="hidden lg:flex gap-1 text-sm">
        <template x-for="v in viste" :key="v.id">
          <button @click="vistaCorrente = v.id"
                  :class="vistaCorrente === v.id ? 'border-primary-600 text-primary-700 dark:text-primary-300 font-semibold' : 'border-transparent text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'"
                  class="px-3 py-1.5 border-b-2 whitespace-nowrap transition-colors"
                  x-text="v.label"></button>
        </template>
      </nav>

      <!-- Info utente + logout -->
      <div class="flex items-center gap-1.5 sm:gap-2 text-xs shrink-0">
        <span class="hidden sm:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs ring-1 ring-gray-200 dark:ring-gray-700 bg-white/70 dark:bg-gray-800/70">
          <span class="status-dot" :class="{ 'bg-green-500': statoSalvataggio==='salvato', 'bg-amber-500 pulsing': statoSalvataggio==='salvataggio', 'bg-yellow-500': statoSalvataggio==='offline', 'bg-red-500': statoSalvataggio==='errore' }"></span>
          <span x-text="statoSalvataggio==='salvato' ? 'Salvato' : statoSalvataggio==='salvataggio' ? 'Salvataggio…' : statoSalvataggio==='offline' ? 'Offline' : 'Errore'"></span>
        </span>
        <span class="sm:hidden status-dot" :class="{ 'bg-green-500': statoSalvataggio==='salvato', 'bg-amber-500 pulsing': statoSalvataggio==='salvataggio', 'bg-yellow-500': statoSalvataggio==='offline', 'bg-red-500': statoSalvataggio==='errore' }" :title="statoSalvataggio"></span>
        <span class="text-gray-500 dark:text-gray-400 hidden md:inline truncate max-w-[150px]" x-text="utente?.email"></span>
        <button @click="eseguiLogout()" class="px-2.5 py-1 bg-red-500 hover:bg-red-600 text-white rounded-lg text-xs font-medium shadow-sm transition active:scale-95">Esci</button>
      </div>
    </div>

    <!-- Menu mobile dropdown -->
    <div x-show="mobileMenuOpen" x-transition
         @click.away="mobileMenuOpen = false"
         class="lg:hidden border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-2 py-2">
      <nav class="flex flex-col gap-0.5">
        <template x-for="v in viste" :key="v.id">
          <button @click="vistaCorrente = v.id; mobileMenuOpen = false"
                  :class="vistaCorrente === v.id ? 'bg-primary-100 dark:bg-primary-900 text-primary-700 dark:text-primary-300 font-semibold' : 'hover:bg-gray-100 dark:hover:bg-gray-700'"
                  class="px-3 py-2.5 rounded-md text-left text-sm transition-colors"
                  x-text="v.label"></button>
        </template>
        <div class="border-t border-gray-200 dark:border-gray-700 mt-1 pt-2 px-3 text-xs text-gray-500 dark:text-gray-400 truncate">
          <span x-text="utente?.email"></span>
        </div>
        <button @click="esportaJSON(); mobileMenuOpen = false" class="px-3 py-2 text-left text-sm text-primary-600 dark:text-primary-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">&darr; Esporta backup JSON</button>
      </nav>
    </div>
  </header>

  <!-- ===== BANNER MODALITÀ OFFLINE ===== -->
  <div x-show="modalitaOffline" class="bg-yellow-100 dark:bg-yellow-900/40 text-yellow-800 dark:text-yellow-200 text-sm px-4 py-2 text-center">
    Modalità offline &mdash; stai vedendo dati dalla cache locale. Le modifiche saranno sincronizzate al ripristino della connessione.
  </div>

  <!-- ===== CONTENUTO PRINCIPALE ===== -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-4">

    <!-- ========== 1. DASHBOARD ========== -->
    <div x-show="vistaCorrente === 'dashboard'" class="page-enter">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-4">
        <h2 class="text-lg font-bold" x-text="'Dashboard — ' + nomeMeseCorrente()"></h2>
        <div class="grid grid-cols-2 sm:flex sm:gap-3 gap-2 text-xs sm:text-sm">
          <div class="rounded-2xl shadow-sm ring-1 ring-gray-200 dark:ring-gray-700 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-3 sm:px-4 sm:py-2.5">
            <div class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">Incassato</div>
            <div class="text-base sm:text-lg font-semibold flex flex-wrap gap-x-2 items-baseline">
              <template x-for="cur in ['EUR','USD']" :key="cur">
                <span x-show="totaleIncassatoMese()[cur] > 0" x-text="formatValuta(totaleIncassatoMese()[cur], cur)" class="text-green-600 dark:text-green-400"></span>
              </template>
              <span x-show="totaleIncassatoMese().EUR === 0 && totaleIncassatoMese().USD === 0" class="text-green-600 dark:text-green-400" x-text="formatValuta(0, 'EUR')"></span>
            </div>
          </div>
          <div class="rounded-2xl shadow-sm ring-1 ring-gray-200 dark:ring-gray-700 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-3 sm:px-4 sm:py-2.5">
            <div class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400">Da incassare</div>
            <div class="text-base sm:text-lg font-semibold flex flex-wrap gap-x-2 items-baseline">
              <template x-for="cur in ['EUR','USD']" :key="cur">
                <span x-show="totaleDaIncassareMese()[cur] > 0" x-text="formatValuta(totaleDaIncassareMese()[cur], cur)" class="text-yellow-600 dark:text-yellow-400"></span>
              </template>
              <span x-show="totaleDaIncassareMese().EUR === 0 && totaleDaIncassareMese().USD === 0" class="text-yellow-600 dark:text-yellow-400" x-text="formatValuta(0, 'EUR')"></span>
            </div>
          </div>
        </div>
      </div>
      <!-- Card proprieta -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
        <template x-for="p in dati.proprieta" :key="p.id">
          <div class="bg-white dark:bg-gray-800 rounded-xl ring-1 ring-gray-200 dark:ring-gray-700 p-3 cursor-pointer transition duration-200 hover:shadow-lg hover:-translate-y-0.5 hover:ring-primary-300 dark:hover:ring-primary-700"
               @click="apriProprieta(p.id)">
            <div class="flex items-center justify-between mb-2">
              <h3 class="font-semibold text-sm" x-text="p.nome"></h3>
              <span x-html="statoAffittoMese(p.id)" class="text-sm"></span>
            </div>
            <div class="text-xs text-gray-500 dark:text-gray-400 space-y-0.5">
              <div>Affitto: <span class="font-medium text-gray-700 dark:text-gray-300" x-text="formatValuta(p.importoAffittoMensile, p.currency)"></span></div>
              <div>Scadenza: <span x-text="labelScadenza(p.scadenzaAffitto)"></span></div>
              <div>Banca: <span x-text="nomeBanca(p.bancaIncasso) || '—'"></span></div>
            </div>
          </div>
        </template>
      </div>
      <!-- Riepilogo giri per banca -->
      <div class="mb-6">
        <h3 class="text-sm font-bold mb-2">Da girare per banca destinazione</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <template x-for="b in dati.banche" :key="b.id">
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-3">
              <div class="flex justify-between items-center">
                <span class="font-semibold text-sm" x-text="b.nome + ' (' + b.intestatario + ')'"></span>
                <span class="text-sm font-bold text-orange-600 dark:text-orange-400 flex gap-2">
                  <template x-for="cur in ['EUR','USD']" :key="cur">
                    <span x-show="totaleDaGirareVersoBanca(b.id)[cur] > 0" x-text="formatValuta(totaleDaGirareVersoBanca(b.id)[cur], cur)"></span>
                  </template>
                  <span x-show="totaleDaGirareVersoBanca(b.id).EUR === 0 && totaleDaGirareVersoBanca(b.id).USD === 0" x-text="formatValuta(0, b.currency)"></span>
                </span>
              </div>
            </div>
          </template>
        </div>
      </div>
      <!-- Utenze in scadenza -->
      <div>
        <h3 class="text-sm font-bold mb-2">Utenze in scadenza (prossimi 30 giorni)</h3>
        <template x-if="utenzeInScadenza().length === 0">
          <p class="text-xs text-gray-400">Nessuna utenza in scadenza</p>
        </template>
        <div class="overflow-x-auto">
          <table x-show="utenzeInScadenza().length > 0" class="w-full table-dense bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-750"><tr>
              <th class="text-left">Proprieta</th><th class="text-left">Tipo</th><th class="text-left">Fornitore</th>
              <th class="text-right">Importo</th><th class="text-left">Scadenza</th><th class="text-left">Stato</th>
            </tr></thead>
            <tbody>
              <template x-for="u in utenzeInScadenza()" :key="u.id">
                <tr class="border-t border-gray-100 dark:border-gray-700">
                  <td x-text="nomeProprieta(u.proprietaId)"></td><td x-text="u.tipo"></td>
                  <td x-text="u.fornitore || '—'"></td><td class="text-right" x-text="formatValuta(u.importo, u.currency)"></td>
                  <td x-text="formatData(u.dataScadenza)"></td><td x-html="badgeStatoUtenza(u.stato)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ========== 2. CALENDARIO ========== -->
    <div x-show="vistaCorrente === 'calendario'" class="page-enter">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-4">
        <div class="flex items-center gap-2">
          <button @click="meseCalendario--; if(meseCalendario<0){meseCalendario=11;annoCalendario--}" class="px-3 py-1.5 rounded bg-gray-200 dark:bg-gray-700 text-sm">&larr;</button>
          <h2 class="text-lg font-bold flex-1 text-center sm:text-left" x-text="nomiMesi[meseCalendario] + ' ' + annoCalendario"></h2>
          <button @click="meseCalendario++; if(meseCalendario>11){meseCalendario=0;annoCalendario++}" class="px-3 py-1.5 rounded bg-gray-200 dark:bg-gray-700 text-sm">&rarr;</button>
        </div>
        <div class="flex gap-2">
          <button @click="generaIncassiMeseVisualizzato()" class="w-full sm:w-auto px-3 py-1.5 bg-primary-500 hover:bg-primary-600 text-white rounded-lg text-xs font-medium shadow-sm transition active:scale-95">+ Genera incassi mancanti</button>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <template x-for="gruppo in gruppiCalendario()" :key="gruppo.label">
          <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-3">
            <h3 class="font-bold text-sm mb-2 text-primary-600 dark:text-primary-400" x-text="gruppo.label"></h3>
            <div class="space-y-2">
              <template x-for="inc in gruppo.incassi" :key="inc.id">
                <div class="flex items-center justify-between p-2 rounded-md gap-2"
                     :class="inc.dataIncasso ? 'bg-green-50 dark:bg-green-900/30' : (isRitardo(inc) ? 'bg-red-50 dark:bg-red-900/30' : 'bg-gray-50 dark:bg-gray-700/50')">
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium truncate" x-text="nomeProprieta(inc.proprietaId)"></div>
                    <div class="text-xs text-gray-500" x-text="formatValuta(inc.importo, inc.currency) + (inc.dataIncasso ? ' — ' + formatData(inc.dataIncasso) : '')"></div>
                  </div>
                  <div class="flex items-center gap-1 shrink-0">
                    <span x-show="inc.dataIncasso" class="text-green-600 text-sm">&#10003;</span>
                    <span x-show="!inc.dataIncasso && isRitardo(inc)" class="text-red-500 text-sm">&#9888;</span>
                    <button x-show="!inc.dataIncasso" @click="segnaIncassatoOggi(inc)"
                            class="px-2.5 py-1 text-xs bg-green-500 hover:bg-green-600 text-white rounded-lg font-medium shadow-sm hover:shadow transition active:scale-95 whitespace-nowrap"><span class="hidden sm:inline">Incassa oggi</span><span class="sm:hidden">Incassa</span></button>
                    <button @click="apriFormIncasso(inc)" class="p-1.5 text-xs bg-gray-300 dark:bg-gray-600 hover:bg-gray-400 rounded" title="Modifica">&#9998;</button>
                    <button @click="eliminaIncasso(inc.id)" class="p-1.5 text-xs text-red-500 hover:text-red-700" title="Elimina">&#10005;</button>
                  </div>
                </div>
              </template>
              <template x-if="gruppo.incassi.length === 0">
                <p class="text-xs text-gray-400 italic">Nessun incasso</p>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Modal modifica incasso -->
      <div x-show="incassoInModifica" x-cloak class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-4 w-full max-w-md" @click.away="incassoInModifica = null">
          <h3 class="font-bold text-base mb-3">Modifica incasso</h3>
          <template x-if="incassoInModifica">
            <div class="space-y-3">
              <div>
                <label class="text-xs text-gray-500">Proprietà</label>
                <div class="font-medium" x-text="nomeProprieta(incassoInModifica.proprietaId)"></div>
              </div>
              <div>
                <label class="text-xs">Mese (YYYY-MM)</label>
                <input type="month" x-model="incassoInModifica.mese" class="w-full text-sm border rounded px-2 py-1 dark:bg-gray-700 dark:border-gray-600">
              </div>
              <div>
                <label class="text-xs">Data prevista</label>

<!-- ============================================================
     LOGICA APPLICATIVA
     ============================================================ -->
<script>
/** Genera un ID univoco breve */
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }

/** Formatta importo nella valuta indicata (EUR default, USD supportato) */
function formatValuta(n, currency = 'EUR') {
  if (n == null || isNaN(n)) return currency === 'USD' ? '$0.00' : '0,00 \u20AC';
  const locale = currency === 'USD' ? 'en-US' : 'it-IT';
  return n.toLocaleString(locale, { style: 'currency', currency });
}

/** Formatta data ISO in gg/mm/aaaa */
function formatData(d) {
  if (!d) return '\u2014';
  const [y, m, g] = d.split('-');
  return g + '/' + m + '/' + y;
}

/** Data odierna ISO */
function oggi() { return new Date().toISOString().split('T')[0]; }

/** Mese corrente YYYY-MM */
function meseCorrente() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

/** Calcola data prevista per incasso */
function dataPrevist(mese, scadenza) {
  const [y, m] = mese.split('-').map(Number);
  if (scadenza === 'fine_mese') {
    const ultimo = new Date(y, m, 0).getDate();
    return y + '-' + String(m).padStart(2, '0') + '-' + String(ultimo).padStart(2, '0');
  }
  const g = parseInt(scadenza) || 1;
  return y + '-' + String(m).padStart(2, '0') + '-' + String(g).padStart(2, '0');
}

/** Dati di esempio iniziali */
function datiEsempio() {
  const bBPM = { id: uid(), nome: 'BPM', intestatario: 'Stefano Desio', currency: 'EUR' };
  const bBPER = { id: uid(), nome: 'BPER', intestatario: 'Gina Desio', currency: 'EUR' };
  const nomi = ['Via Guelfa','Via Dei Servi','Elba 508','Elba 626','Follonica Bicocchi','Franklin 214','Sweetzer 201','Ghibellina 101','Larrabee 116'];
  const importi = [800,900,750,650,1000,1200,1100,850,950];
  const proprieta = nomi.map((nome, i) => ({
    id: uid(), nome, tipo: 'appartamento',
    scadenzaAffitto: i % 3 === 0 ? '1' : (i % 3 === 1 ? '15' : 'fine_mese'),
    importoAffittoMensile: importi[i],
    bancaIncasso: i % 2 === 0 ? bBPM.id : bBPER.id,
    intestatario: i % 2 === 0 ? 'Stefano Desio' : 'Gina Desio',
    bancaDestinazione: i % 2 === 0 ? bBPER.id : bBPM.id,
    currency: 'EUR',
    note: ''
  }));
  return { dataVersion: 2, proprieta, banche: [bBPM, bBPER], incassiAffitti: [], utenze: [] };
}

/** Migrazione schema dati: idempotente, applica cambiamenti incrementali per versione. */
function migraDati(dati) {
  if (!dati || typeof dati !== 'object') return dati;
  if (!dati.dataVersion || dati.dataVersion < 2) {
    if (Array.isArray(dati.proprieta)) {
      for (const p of dati.proprieta) { if (!p.currency) p.currency = 'EUR'; }
    }
    if (Array.isArray(dati.banche)) {
      for (const b of dati.banche) { if (!b.currency) b.currency = 'EUR'; }
    }
    if (Array.isArray(dati.incassiAffitti)) {
      for (const i of dati.incassiAffitti) { if (!i.currency) i.currency = 'EUR'; }
    }
    if (Array.isArray(dati.utenze)) {
      for (const u of dati.utenze) { if (!u.currency) u.currency = 'EUR'; }
    }
    dati.dataVersion = 2;
  }
  return dati;
}

// ---------- Componente Alpine principale ----------
function app() {
  return {
    viste: [
      { id: 'dashboard', label: 'Dashboard' },
      { id: 'calendario', label: 'Calendario' },
      { id: 'proprieta', label: 'Propriet\u00E0' },
      { id: 'banche', label: 'Banche' },
      { id: 'utenze', label: 'Utenze' },
      { id: 'impostazioni', label: 'Impostazioni' }
    ],
    vistaCorrente: 'dashboard',
    mobileMenuOpen: false,
    nomiMesi: ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'],
    dati: { dataVersion: 2, proprieta: [], banche: [], incassiAffitti: [], utenze: [] },
    statoSalvataggio: 'salvato',
    modalitaOffline: false,
    // --- Stato autenticazione ---
    utente: null,
    caricamentoIniziale: true,
    modalitaAuth: 'login',
    authEmail: '',
    authPassword: '',
    authError: '',
    authInfo: '',
    authLoading: false,
    debounceTimer: null,
    proprietaSelezionata: null,
    annoProprieta: new Date().getFullYear(),
    meseCalendario: new Date().getMonth(),
    annoCalendario: new Date().getFullYear(),
    meseBanca: meseCorrente(),
    incassoInModifica: null,
    filtroUtenzeProprieta: '', filtroUtenzeTipo: '', filtroUtenzeStato: '',
    filtroUtenzeAnno: new Date().getFullYear(),
    mostraFormUtenza: false, nuovaUtenza: {},
    mostraFormProprieta: false, editProprieta: {},
    mostraFormBanca: false, editBanca: {},

    async init() {
      // Verifica se esiste una sessione attiva
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        this.utente = session.user;
        await this.caricaDatiUtente();
      }
      this.caricamentoIniziale = false;

      // Ascolta cambiamenti di auth (login in altra tab, logout, refresh token)
      sb.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
          this.utente = session.user;
          await this.caricaDatiUtente();
        } else if (event === 'SIGNED_OUT') {
          this.utente = null;
          this.dati = { dataVersion: 2, proprieta: [], banche: [], incassiAffitti: [], utenze: [] };
        }
      });

      // Listener connettivita: quando torna online rilanciamo caricaDatiUtente
      // che, grazie al confronto updated_at, ri-pushera la cache se piu recente.
      window.addEventListener('online', () => {
        if (this.utente && this.modalitaOffline) {
          this.caricaDatiUtente();
        }
      });
      window.addEventListener('offline', () => {
        this.modalitaOffline = true;
      });
    },

    // --- Autenticazione ---
    async eseguiLogin() {
      this.authLoading = true; this.authError = ''; this.authInfo = '';
      try {
        const { data, error } = await sb.auth.signInWithPassword({
          email: this.authEmail.trim(),
          password: this.authPassword
        });
        if (error) throw error;
        this.utente = data.user;
        this.authPassword = '';
        await this.caricaDatiUtente();
      } catch(e) {
        this.authError = this.traduciErroreAuth(e.message);
      } finally {
        this.authLoading = false;
      }
    },

    async eseguiSignup() {
      this.authLoading = true; this.authError = ''; this.authInfo = '';
      try {
        const { data, error } = await sb.auth.signUp({
          email: this.authEmail.trim(),
          password: this.authPassword
        });
        if (error) throw error;
        // Se Supabase richiede conferma email, session e null
        if (!data.session) {
          this.authInfo = 'Ti abbiamo inviato una email di conferma. Clicca il link per attivare l\'account, poi torna qui per accedere.';
          this.modalitaAuth = 'login';
        } else {
          // Altrimenti login automatico
          this.utente = data.user;
          this.authPassword = '';
          await this.caricaDatiUtente();
        }
      } catch(e) {
        this.authError = this.traduciErroreAuth(e.message);
      } finally {
        this.authLoading = false;
      }
    },

    async eseguiLogout() {
      await sb.auth.signOut();
      this.utente = null;
      this.dati = { proprieta: [], banche: [], incassiAffitti: [], utenze: [] };
      this.authEmail = ''; this.authPassword = '';
    },

    traduciErroreAuth(msg) {
      if (/invalid login credentials/i.test(msg)) return 'Email o password errati.';
      if (/email not confirmed/i.test(msg)) return 'Email non ancora confermata. Controlla la tua casella.';
      if (/user already registered/i.test(msg)) return 'Esiste gia un account con questa email. Prova ad accedere.';
      if (/password should be at least/i.test(msg)) return 'La password deve essere di almeno 6 caratteri.';
      if (/invalid.*email/i.test(msg)) return 'Email non valida.';
      return msg;
    },

    // --- Persistenza su Supabase ---
    async caricaDatiUtente() {
      this.statoSalvataggio = 'salvataggio';
      try {
        const { data, error } = await sb.from('user_data')
          .select('data, updated_at').eq('user_id', this.utente.id).maybeSingle();
        if (error) throw error;

        // Conflict resolution: se la cache locale e piu recente del remoto, ri-pusha.
        let cacheLocale = null;
        try {
          const raw = localStorage.getItem('gestione_affitti_cache');
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && parsed.user_id === this.utente.id && parsed.data && parsed.updated_at) {
              cacheLocale = parsed;
            }
          }
        } catch(cacheErr) {
          console.warn('Cache locale illeggibile:', cacheErr);
        }

        const remotoUpdatedAt = data && data.updated_at ? data.updated_at : null;
        const cacheEPiuRecente = cacheLocale && (!remotoUpdatedAt || cacheLocale.updated_at > remotoUpdatedAt);

        if (cacheEPiuRecente) {
          // Cache locale vince: ripushiamo su Supabase senza sovrascriverla.
          this.dati = migraDati(cacheLocale.data);
          this.modalitaOffline = false;
          this.generaIncassiAttesi();
          this.resetFormUtenza();
          await this.salvaSubito();
          return;
        }

        if (data && data.data && data.data.proprieta) {
          // Dati esistenti trovati nel DB: applica migrazione se necessario
          const versionePrima = data.data.dataVersion || 0;
          const migrati = migraDati(data.data);
          this.dati = migrati;
          this.modalitaOffline = false;
          if ((migrati.dataVersion || 0) !== versionePrima) {
            await this.salvaSubito();
          }
        } else {
          // Primo accesso: inizializza con dati di esempio e salva
          this.dati = datiEsempio();
          this.modalitaOffline = false;
          await this.salvaSubito();
        }
        this.generaIncassiAttesi();
        this.resetFormUtenza();
        this.statoSalvataggio = 'salvato';
      } catch(e) {
        console.error('Errore caricamento dati:', e);
        // Fallback offline: tenta lettura da cache localStorage
        try {
          const raw = localStorage.getItem('gestione_affitti_cache');
          if (raw) {
            const cache = JSON.parse(raw);
            if (cache && cache.user_id === this.utente.id && cache.data) {
              this.dati = migraDati(cache.data);
              this.modalitaOffline = true;
              this.generaIncassiAttesi();
              this.resetFormUtenza();
              this.statoSalvataggio = 'errore';
              return;
            }
          }
        } catch(cacheErr) {
          console.error('Errore lettura cache offline:', cacheErr);
        }
        this.statoSalvataggio = 'errore';
      }
    },

    /** Salvataggio con debounce (300ms) per evitare richieste eccessive */
    salva() {
      if (!this.utente) return;
      this.statoSalvataggio = 'salvataggio';
      clearTimeout(this.debounceTimer);
      this.debounceTimer = setTimeout(() => this.salvaSubito(), 300);
    },

    /** Salvataggio immediato su Supabase (upsert) */
    async salvaSubito() {
      if (!this.utente) return;
      const ora = new Date().toISOString();
      // Aggiorna sempre la cache locale PRIMA dell'upsert: cosi se la rete
      // cade a meta operazione le modifiche non vanno perse.
      const scriviCache = () => {
        try {
          localStorage.setItem('gestione_affitti_cache', JSON.stringify({
            data: this.dati,
            updated_at: ora,
            user_id: this.utente.id
          }));
        } catch(cacheErr) {
          console.warn('Impossibile aggiornare cache locale:', cacheErr);
        }
      };

      if (this.modalitaOffline) {
        // Gia offline: scrivi solo cache, non tentare la rete.
        scriviCache();
        this.statoSalvataggio = 'offline';
        return;
      }

      try {
        const { error } = await sb.from('user_data').upsert({
          user_id: this.utente.id,
          data: this.dati,
          updated_at: ora
        });
        if (error) throw error;
        scriviCache();
        this.modalitaOffline = false;
        this.statoSalvataggio = 'salvato';
      } catch(e) {
        console.error('Errore salvataggio:', e);
        // Rete/RLS ko: comunque persisti in cache per non perdere le modifiche.
        scriviCache();
        this.modalitaOffline = true;
        this.statoSalvataggio = 'offline';
      }
    },

    esportaJSON() {
      const blob = new Blob([JSON.stringify(this.dati, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'dati.json'; a.click();
      URL.revokeObjectURL(a.href);
    },

    async importaJSON(event) {
      const file = event.target.files[0]; if (!file) return;
      try { this.dati = JSON.parse(await file.text()); this.generaIncassiAttesi(); await this.salva();
      } catch(e) { alert('Errore nel file JSON: ' + e.message); }
    },

    // --- Generazione automatica incassi ---
    generaIncassiAttesi() {
      const adesso = new Date();
      const mesi = [meseCorrente()];
      if (adesso.getDate() >= 20) {
        let mm = adesso.getMonth() + 2, yy = adesso.getFullYear();
        if (mm > 12) { mm = 1; yy++; }
        mesi.push(yy + '-' + String(mm).padStart(2, '0'));
      }
      for (const mese of mesi) {
        for (const prop of this.dati.proprieta) {
          const esistente = this.dati.incassiAffitti.find(i => i.proprietaId === prop.id && i.mese === mese);
          if (esistente) {
            // Aggiorna incassi non ancora incassati con i nuovi dati della proprieta
            if (!esistente.dataIncasso) {
              esistente.importo = prop.importoAffittoMensile;
              esistente.bancaId = prop.bancaIncasso;
              esistente.dataPrevista = dataPrevist(mese, prop.scadenzaAffitto);
            }
            continue;
          }
          if (prop.importoAffittoMensile > 0) {
            this.dati.incassiAffitti.push({
              id: uid(), proprietaId: prop.id, mese,
              dataPrevista: dataPrevist(mese, prop.scadenzaAffitto),
              dataIncasso: null, importo: prop.importoAffittoMensile,
              bancaId: prop.bancaIncasso, girato: false,
              dataGiro: null, bancaDestinazioneId: null,
              currency: prop.currency || 'EUR', note: ''
            });
          }
        }
      }
    },

    // --- Lookup ---
    nomeProprieta(id) { const p = this.dati.proprieta.find(x => x.id === id); return p ? p.nome : '\u2014'; },
    getProprieta(id) { return this.dati.proprieta.find(x => x.id === id) || {}; },
    nomeBanca(id) { const b = this.dati.banche.find(x => x.id === id); return b ? b.nome : ''; },
    labelScadenza(s) { return s === 'fine_mese' ? 'Fine mese' : 'Giorno ' + s; },
    nomeMeseCorrente() { const d = new Date(); return this.nomiMesi[d.getMonth()] + ' ' + d.getFullYear(); },

    // --- Dashboard ---
    incassiMeseCorrente() { const mc = meseCorrente(); return this.dati.incassiAffitti.filter(i => i.mese === mc); },
    totaleIncassatoMese() {
      return this.incassiMeseCorrente().filter(i => i.dataIncasso).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    totaleDaIncassareMese() {
      return this.incassiMeseCorrente().filter(i => !i.dataIncasso).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    statoAffittoMese(propId) {
      const inc = this.dati.incassiAffitti.find(i => i.proprietaId === propId && i.mese === meseCorrente());
      if (!inc) return '<span class="text-gray-400">\u2014</span>';
      if (inc.dataIncasso) return '<span class="text-green-600" title="Incassato">\u2705</span>';
      if (this.isRitardo(inc)) return '<span class="text-red-500" title="In ritardo">\u26A0\uFE0F</span>';
      return '<span class="text-yellow-500" title="Atteso">\u23F3</span>';
    },
    isRitardo(inc) { return !inc.dataIncasso && inc.dataPrevista < oggi(); },
    totaleDaGirareBanca(bancaId) {
      return this.dati.incassiAffitti.filter(i => i.bancaId === bancaId && i.dataIncasso && !i.girato).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    totaleDaGirareVersoBanca(bancaDestId) {
      // Somma incassi non girati la cui proprietà ha come bancaDestinazione questa banca
      return this.dati.incassiAffitti.filter(i => {
        if (!i.dataIncasso || i.girato) return false;
        const prop = this.dati.proprieta.find(p => p.id === i.proprietaId);
        return prop && prop.bancaDestinazione === bancaDestId;
      }).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    utenzeInScadenza() {
      const lim = new Date(); lim.setDate(lim.getDate() + 30);
      const limISO = lim.toISOString().split('T')[0], oggiISO = oggi();
      return this.dati.utenze
        .filter(u => u.dataScadenza && u.dataScadenza >= oggiISO && u.dataScadenza <= limISO && u.stato !== 'pagata' && u.stato !== 'rimborsata_inquilino')
        .sort((a, b) => a.dataScadenza.localeCompare(b.dataScadenza));
    },
    badgeStatoUtenza(stato) {
      const m = {
        'da_ricevere': '<span class="px-1.5 py-0.5 rounded text-xs bg-gray-200 dark:bg-gray-600">Da ricevere</span>',
        'ricevuta': '<span class="px-1.5 py-0.5 rounded text-xs bg-yellow-100 dark:bg-yellow-900 text-yellow-800 dark:text-yellow-200">Ricevuta</span>',
        'pagata': '<span class="px-1.5 py-0.5 rounded text-xs bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200">Pagata</span>',
        'rimborsata_inquilino': '<span class="px-1.5 py-0.5 rounded text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200">Rimborsata</span>'
      };
      return m[stato] || stato;
    },

    // --- Calendario ---
    gruppiCalendario() {
      const mese = this.annoCalendario + '-' + String(this.meseCalendario + 1).padStart(2, '0');
      const incM = this.dati.incassiAffitti.filter(i => i.mese === mese);
      const g1 = [], g15 = [], gfine = [];
      for (const inc of incM) {
        const prop = this.dati.proprieta.find(p => p.id === inc.proprietaId);
        if (!prop) continue;
        if (prop.scadenzaAffitto === '1') g1.push(inc);
        else if (prop.scadenzaAffitto === '15') g15.push(inc);
        else gfine.push(inc);
      }
      return [{ label: 'Giorno 1', incassi: g1 }, { label: 'Giorno 15', incassi: g15 }, { label: 'Fine mese', incassi: gfine }];
    },
    segnaIncassatoOggi(inc) { inc.dataIncasso = oggi(); this.salva(); },

    // Genera incassi mancanti per il mese attualmente visualizzato nel calendario
    // (utile per mesi passati o futuri non ancora auto-generati)
    generaIncassiMeseVisualizzato() {
      const mese = this.annoCalendario + '-' + String(this.meseCalendario + 1).padStart(2, '0');
      let creati = 0;
      for (const prop of this.dati.proprieta) {
        const esiste = this.dati.incassiAffitti.some(i => i.proprietaId === prop.id && i.mese === mese);
        if (esiste || !(prop.importoAffittoMensile > 0)) continue;
        this.dati.incassiAffitti.push({
          id: uid(), proprietaId: prop.id, mese,
          dataPrevista: dataPrevist(mese, prop.scadenzaAffitto),
          dataIncasso: null, importo: prop.importoAffittoMensile,
          bancaId: prop.bancaIncasso, girato: false,
          dataGiro: null, bancaDestinazioneId: null,
          currency: prop.currency || 'EUR', note: ''
        });
        creati++;
      }
      if (creati === 0) alert('Nessun incasso da creare: sono tutti già presenti per ' + mese + '.');
      else this.salva();
    },

    // Modifica incasso esistente tramite modal
    apriFormIncasso(inc) { this.incassoInModifica = { ...inc }; },
    salvaIncassoModificato() {
      if (!this.incassoInModifica) return;
      const idx = this.dati.incassiAffitti.findIndex(i => i.id === this.incassoInModifica.id);
      if (idx >= 0) {
        // Se dataIncasso e stringa vuota, convertila in null
        if (this.incassoInModifica.dataIncasso === '') this.incassoInModifica.dataIncasso = null;
        this.dati.incassiAffitti[idx] = { ...this.incassoInModifica };
        this.salva();
      }
      this.incassoInModifica = null;
    },
    eliminaIncasso(id) {
      if (!confirm('Eliminare questo incasso?')) return;
      this.dati.incassiAffitti = this.dati.incassiAffitti.filter(i => i.id !== id);
      this.salva();
    },

    // --- Proprieta dettaglio ---
    apriProprieta(id) { this.proprietaSelezionata = id; this.vistaCorrente = 'proprieta'; },
    anniDisponibili() { const a = new Date().getFullYear(); return [a - 2, a - 1, a, a + 1]; },
    storicoIncassiProprieta(propId, anno) {
      return this.dati.incassiAffitti.filter(i => i.proprietaId === propId && i.mese.startsWith(String(anno)))
        .sort((a, b) => b.dataPrevista.localeCompare(a.dataPrevista));
    },
    totaleIncassiAnno(propId, anno) {
      return this.storicoIncassiProprieta(propId, anno).filter(i => i.dataIncasso).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    storicoUtenzeProprieta(propId, anno) {
      return this.dati.utenze.filter(u => u.proprietaId === propId && u.dataScadenza && u.dataScadenza.startsWith(String(anno)))
        .sort((a, b) => b.dataScadenza.localeCompare(a.dataScadenza));
    },
    totaleUtenzeAnno(propId, anno) {
      return this.storicoUtenzeProprieta(propId, anno).reduce((acc, u) => {
        const cur = u.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (u.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },

    // --- Movimenti banca ---
    incassiBancaMese(bancaId) {
      return this.dati.incassiAffitti.filter(i => i.bancaId === bancaId && i.mese === this.meseBanca)
        .sort((a, b) => (a.dataPrevista || '').localeCompare(b.dataPrevista || ''));
    },
    totaleIncassatoBancaMese(bancaId) {
      return this.incassiBancaMese(bancaId).filter(i => i.dataIncasso).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    totaleDaGirareBancaMese(bancaId) {
      return this.incassiBancaMese(bancaId).filter(i => i.dataIncasso && !i.girato).reduce((acc, i) => {
        const cur = i.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (i.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    segnaGirato(inc, bancaDestId) {
      if (!bancaDestId) return;
      const bancaOrig = this.dati.banche.find(b => b.id === inc.bancaId);
      const bancaDest = this.dati.banche.find(b => b.id === bancaDestId);
      if (bancaOrig && bancaDest && (bancaOrig.currency || 'EUR') !== (bancaDest.currency || 'EUR')) {
        alert('Impossibile girare fondi tra banche con valute diverse.');
        return;
      }
      inc.girato = true; inc.dataGiro = oggi(); inc.bancaDestinazioneId = bancaDestId; this.salva();
    },

    // --- Utenze ---
    resetFormUtenza() {
      this.nuovaUtenza = {
        proprietaId: this.dati.proprieta.length > 0 ? this.dati.proprieta[0].id : '',
        tipo: 'acqua', fornitore: '', periodoRiferimento: '',
        dataScadenza: '', importo: 0, stato: 'da_ricevere', currency: 'EUR', note: ''
      };
    },
    utenzeFiltrate() {
      return this.dati.utenze.filter(u => {
        if (this.filtroUtenzeProprieta && u.proprietaId !== this.filtroUtenzeProprieta) return false;
        if (this.filtroUtenzeTipo && u.tipo !== this.filtroUtenzeTipo) return false;
        if (this.filtroUtenzeStato && u.stato !== this.filtroUtenzeStato) return false;
        if (this.filtroUtenzeAnno && u.dataScadenza && !u.dataScadenza.startsWith(String(this.filtroUtenzeAnno))) return false;
        return true;
      }).sort((a, b) => (b.dataScadenza || '').localeCompare(a.dataScadenza || ''));
    },
    totaleUtenzeFiltrate() {
      return this.utenzeFiltrate().reduce((acc, u) => {
        const cur = u.currency || 'EUR';
        acc[cur] = (acc[cur] || 0) + (u.importo || 0);
        return acc;
      }, { EUR: 0, USD: 0 });
    },
    aggiungiUtenza() {
      const prop = this.dati.proprieta.find(p => p.id === this.nuovaUtenza.proprietaId);
      const currency = this.nuovaUtenza.currency || (prop && prop.currency) || 'EUR';
      this.dati.utenze.push({ id: uid(), ...this.nuovaUtenza, currency });
      this.mostraFormUtenza = false; this.resetFormUtenza(); this.salva();
    },
    cambiaStatoUtenza(u, stato) {
      if (!stato) return; u.stato = stato;
      if (stato === 'pagata') u.dataPagamento = oggi();
      this.salva();
    },
    eliminaUtenza(id) {
      if (!confirm('Eliminare questa utenza?')) return;
      this.dati.utenze = this.dati.utenze.filter(u => u.id !== id); this.salva();
    },

    // --- Impostazioni: Proprieta ---
    creaProprieta() {
      return { id: null, nome: '', tipo: 'appartamento', scadenzaAffitto: '1',
        importoAffittoMensile: 0, bancaIncasso: '', intestatario: '', bancaDestinazione: '',
        currency: 'EUR', note: '' };
    },
    modificaProprieta(p) { this.editProprieta = { ...p }; this.mostraFormProprieta = true; },
    salvaProprieta() {
      if (!this.editProprieta.nome) return alert('Inserire il nome');
      if (this.editProprieta.id) {
        const idx = this.dati.proprieta.findIndex(p => p.id === this.editProprieta.id);
        if (idx >= 0) this.dati.proprieta[idx] = { ...this.editProprieta };
      } else { this.editProprieta.id = uid(); this.dati.proprieta.push({ ...this.editProprieta }); }
      this.mostraFormProprieta = false; this.generaIncassiAttesi(); this.salva();
    },
    eliminaProprieta(id) {
      if (!confirm('Eliminare questa proprieta e tutti i dati collegati?')) return;
      this.dati.proprieta = this.dati.proprieta.filter(p => p.id !== id);
      this.dati.incassiAffitti = this.dati.incassiAffitti.filter(i => i.proprietaId !== id);
      this.dati.utenze = this.dati.utenze.filter(u => u.proprietaId !== id);
      this.salva();
    },

    // --- Impostazioni: Banche ---
    creaBanca() { return { id: null, nome: '', intestatario: '', currency: 'EUR' }; },
    modificaBanca(b) { this.editBanca = { ...b }; this.mostraFormBanca = true; },
    salvaBanca() {
      if (!this.editBanca.nome) return alert('Inserire il nome della banca');
      if (this.editBanca.id) {
        const idx = this.dati.banche.findIndex(b => b.id === this.editBanca.id);
        if (idx >= 0) this.dati.banche[idx] = { ...this.editBanca };
      } else { this.editBanca.id = uid(); this.dati.banche.push({ ...this.editBanca }); }
      this.mostraFormBanca = false; this.salva();
    },
    eliminaBanca(id) {
      const nIncassi = this.dati.incassiAffitti.filter(i => i.bancaId === id || i.bancaDestinazioneId === id).length;
      const nProp = this.dati.proprieta.filter(p => p.bancaIncasso === id || p.bancaDestinazione === id).length;
      if (nIncassi + nProp > 0) {
        alert('Impossibile eliminare: ' + nProp + ' proprietà e ' + nIncassi + ' incassi usano questa banca.');
        return;
      }
      if (!confirm('Eliminare questa banca?')) return;
      this.dati.banche = this.dati.banche.filter(b => b.id !== id); this.salva();
    },

    formatValuta, formatData
  };
}
</script>
